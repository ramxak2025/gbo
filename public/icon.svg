<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="iGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a8c0ff"/>
      <stop offset="50%" stop-color="#6b8cce"/>
      <stop offset="100%" stop-color="#3f5f99"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7c5cbf"/>
      <stop offset="50%" stop-color="#9b6dd7"/>
      <stop offset="100%" stop-color="#6a3fa0"/>
    </linearGradient>
    <linearGradient id="belt1" x1="0" y1="0" x2="1" y2="1">
