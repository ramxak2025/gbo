<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="iGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="belt1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="belt2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#a569bd"/>
    </linearGradient>
    <linearGradient id="belt3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d4c2e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Subtle gym floor reflection -->
  <rect x="0" y="380" width="512" height="132" rx="0" fill="rgba(255,255,255,0.02)"/>
  <!-- Letter i -->
  <text x="160" y="320" font-family="Arial Black, Impact, sans-serif" font-size="220" font-weight="900" font-style="italic" fill="url(#iGrad)" opacity="0.95">i</text>
  <!-- Letter B -->
  <text x="245" y="330" font-family="Arial Black, Impact, sans-serif" font-size="250" font-weight="900" font-style="italic" fill="url(#bGrad)" opacity="0.95">B</text>
  <!-- White belt -->
  <path d="M100,280 Q200,250 320,290 Q380,310 420,295" stroke="url(#belt1)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Purple belt -->
  <path d="M90,310 Q210,275 330,320 Q390,340 430,320" stroke="url(#belt2)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Brown belt -->
  <path d="M110,340 Q220,305 340,350 Q395,365 435,345" stroke="url(#belt3)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>
