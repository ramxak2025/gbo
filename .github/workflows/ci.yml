name: CI

on:
  push:
    branches: [main, claude/**, mobile/**, web/**]
  pull_request:
    branches: [main, claude/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint + build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  mobile-typecheck:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        working-directory: ./mobile
        run: npx tsc --noEmit || echo "::warning::Mobile TS has non-blocking errors in legacy JS files — full migration in progress"
        continue-on-error: true

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm audit (root, high/critical only)
        run: npm audit --audit-level=high || echo "::warning::High/critical vulnerabilities in transitive deps"
        continue-on-error: true
