name: Deploy to VDS

on:
  push:
    branches:
      - claude/iborcuha-saas-platform-m8HZw
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            cd /root/gbo
            git fetch origin claude/iborcuha-saas-platform-m8HZw
            git checkout claude/iborcuha-saas-platform-m8HZw
            git pull origin claude/iborcuha-saas-platform-m8HZw
            npm install --production
            npm run build
            pm2 restart iborcuha 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
