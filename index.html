<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iBorcuha" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="iBorcuha" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>iBorcuha</title>
    <script>
      // Flutter WebView auth bridge — runs BEFORE React loads
      try {
        var h = window.location.hash;
        if (h.indexOf('__ft=') > -1) {
          var p = new URLSearchParams(h.substring(1));
          var t = p.get('__ft');
          var a = p.get('__fa');
          if (t) localStorage.setItem('iborcuha_token', t);
          if (a) localStorage.setItem('iborcuha_auth', decodeURIComponent(a));
          // Mark as Flutter embed so React skips post-login redirect
          window.__isFlutterEmbed = true;
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      } catch(e) {}
    </script>
  </head>
  <body class="overscroll-none" style="background:#050505;margin:0;min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
